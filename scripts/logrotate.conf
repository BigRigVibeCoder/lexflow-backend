# /etc/logrotate.d/lexflow
# LexFlow log rotation configuration
#
# Rotates application JSONL logs daily, keeps 14 days, compresses old logs.
#
# INSTALL:
#   sudo cp scripts/logrotate.conf /etc/logrotate.d/lexflow
#
# REF: SPR-008 T-076V (Log rotation)
# REF: GOV-006 §4 (Persistent logging)

/var/log/lexflow/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    sharedscripts
    postrotate
        # Signal PM2 to reopen log files after rotation
        pm2 reloadLogs 2>/dev/null || true
    endscript
}
