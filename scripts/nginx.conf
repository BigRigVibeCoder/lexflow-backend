# ============================================================================
# nginx.conf — LexFlow Production Reverse Proxy
# ============================================================================
#
# Routes:
#   /             → localhost:3000 (Next.js Web Service)
#   /api/trust/   → localhost:4000 (Fastify Trust Service)
#
# REF: GOV-008 §3.2 (nginx reverse proxy)
# REF: SPR-001 T-004V (VM Provisioning)
# ============================================================================

upstream lexflow_web {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream lexflow_trust {
    server 127.0.0.1:4000;
    keepalive 64;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Security Headers ────────────────────────────────────────────

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logging ─────────────────────────────────────────────────────

    access_log /var/log/nginx/lexflow-access.log;
    error_log /var/log/nginx/lexflow-error.log;

    # ── Trust Service Routes ────────────────────────────────────────
    # CON-002 routes — proxy to Fastify on port 4000

    location /api/trust/ {
        proxy_pass http://lexflow_trust;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeout settings
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Trust Service health endpoint
    location = /health {
        proxy_pass http://lexflow_trust/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Web Service Routes ──────────────────────────────────────────
    # Everything else → Next.js on port 3000

    location / {
        proxy_pass http://lexflow_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout settings
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── Static Assets ───────────────────────────────────────────────

    location /_next/static/ {
        proxy_pass http://lexflow_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
