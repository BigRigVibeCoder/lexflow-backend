# ============================================================================
# nginx-ssl.conf — LexFlow Production Reverse Proxy with TLS
# ============================================================================
#
# HTTPS configuration using Let's Encrypt certificates.
#
# USAGE:
#   sudo cp scripts/nginx-ssl.conf /etc/nginx/sites-available/lexflow
#   sudo ln -sf /etc/nginx/sites-available/lexflow /etc/nginx/sites-enabled/lexflow
#   sudo nginx -t && sudo systemctl reload nginx
#
# PREREQUISITES:
#   Certbot SSL certificates exist at /etc/letsencrypt/live/lexflow-prod.example.com/
#   Run: sudo certbot certonly --nginx -d lexflow-prod.example.com
#
# REF: SPR-008 T-076V (TLS via Let's Encrypt)
# REF: GOV-008 §3.2 (nginx reverse proxy)
# ============================================================================

upstream lexflow_web {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream lexflow_trust {
    server 127.0.0.1:4000;
    keepalive 64;
}

# ── HTTP → HTTPS Redirect ──────────────────────────────────────────────────

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ───────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lexflow-prod.example.com;

    # ── TLS Certificates ───────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/lexflow-prod.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lexflow-prod.example.com/privkey.pem;

    # ── TLS Configuration ──────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ── Security Headers ───────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logging ────────────────────────────────────────────────────────
    access_log /var/log/nginx/lexflow-access.log;
    error_log /var/log/nginx/lexflow-error.log;

    # ── Trust Service Routes ───────────────────────────────────────────
    location /api/trust/ {
        proxy_pass http://lexflow_trust;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Trust Service health endpoint
    location = /health {
        proxy_pass http://lexflow_trust/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Web Service Routes ─────────────────────────────────────────────
    location / {
        proxy_pass http://lexflow_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── Static Assets ──────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://lexflow_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
